apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-gateway-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agent-lifecycle-manager
    app.kubernetes.io/component: config
data:
  issuer-url: {{ .Values.gatewayConfig.issuerUrl | quote }}
  token-exchange-url: {{ .Values.gatewayConfig.tokenExchangeUrl | quote }}
  trust-domain: {{ .Values.gatewayConfig.trustDomain | quote }}
---
{{- if .Values.spireTrustBundle.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-trust-bundle
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agent-lifecycle-manager
    app.kubernetes.io/component: identity
data:
  ca-certificates.crt: {{ .Values.spireTrustBundle.data | quote }}
{{- end }}
