apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-lifecycle-manager
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agent-lifecycle-manager
    app.kubernetes.io/component: manager
spec:
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-lifecycle-manager
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-lifecycle-manager
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: agent-lifecycle-manager
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          command:
            - /manager
          args:
            - --leader-elect
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
