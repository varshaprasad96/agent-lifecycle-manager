{{- if .Values.router.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-router
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agent-lifecycle-manager
    app.kubernetes.io/component: router
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-lifecycle-manager
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-lifecycle-manager
        app.kubernetes.io/component: router
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          args:
            - --grpc-addr=:50051
            - --health-addr=:8081
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: agent-router
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agent-lifecycle-manager
    app.kubernetes.io/component: router
spec:
  selector:
    app.kubernetes.io/name: agent-lifecycle-manager
    app.kubernetes.io/component: router
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
{{- end }}
